<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PocketBook Categories</title>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; background: rgb(15,23,42); color: rgb(226,232,240); margin: 0; padding: 24px; }
    .card { background: rgb(17,24,39); border: 1px solid rgb(31,41,55); border-radius: 12px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); margin-bottom: 16px; }
    nav a { color: rgb(226,232,240); text-decoration: none; padding: 6px 10px; border-radius: 8px; border:1px solid rgb(31,41,55); background:rgb(11,18,32); }
    button { background: rgb(37,99,235); border: none; color: white; padding: 10px 12px; border-radius: 8px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .cat-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgb(31,41,55);}
    .pill { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; color:rgb(226,232,240); }
  </style>
</head>
<body>
  <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px;">
    <div style="font-size:22px; font-weight:700;">PocketBook</div>
    <nav style="display:flex; gap:10px;">
      <a href="/">Dashboard</a>
      <a href="/categories">Categories</a>
      <a href="/transactions">Transactions</a>
      <a href="/accounts">Accounts</a>
    </nav>
  </div>
  <h2>Manage categories</h2>

  <div class="card">
    <div style="font-size:14px; font-weight:600; margin-bottom:6px;">Create / Edit category</div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
      <input id="cat-name" placeholder="Name" style="padding:8px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);" />
      <select id="cat-color" style="padding:8px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);">
        <option value="">Color</option>
        <option value="rgb(239,68,68)">Red</option>
        <option value="rgb(249,115,22)">Orange</option>
        <option value="rgb(245,158,11)">Amber</option>
        <option value="rgb(234,179,8)">Yellow</option>
        <option value="rgb(34,197,94)">Green</option>
        <option value="rgb(20,184,166)">Teal</option>
        <option value="rgb(6,182,212)">Cyan</option>
        <option value="rgb(59,130,246)">Blue</option>
        <option value="rgb(99,102,241)">Indigo</option>
        <option value="rgb(139,92,246)">Violet</option>
        <option value="rgb(236,72,153)">Pink</option>
        <option value="rgb(249,115,171)">Fuchsia</option>
      </select>
      <input id="cat-budget" placeholder="Budget amount" style="padding:8px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240); width:140px;" />
      <button id="save-cat-btn">Save category</button>
    </div>
    <div id="categories-list"></div>
  </div>

  <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:50;">
    <div style="background:rgb(15,23,42); border:1px solid rgb(31,41,55); border-radius:12px; padding:20px; width:520px; color:rgb(226,232,240); box-shadow:0 10px 40px rgba(0,0,0,0.45); max-height:80vh; overflow:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div id="modal-title" style="font-size:18px; font-weight:700;"></div>
        <button id="close-modal" style="background:rgb(31,41,55); padding:6px 10px;">X</button>
      </div>
      <div id="modal-body" style="font-size:14px;"></div>
      <div id="modal-status" style="font-size:12px; color:rgb(203,213,225); margin-top:8px;"></div>
    </div>
  </div>

  <script>
    async function fetchJson(url, options={}) {
      const res = await fetch(url, {headers: {"Content-Type": "application/json"}, ...options});
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    }

    let _categories = [];
    let _rules = [];
    let _subcategories = [];
    let _modalCatId = null;
    let _modalMode = null; // 'rules' or 'subs'

    function findExistingRule(merchant, desc) {
      return _rules.find(r =>
        (merchant && r.merchant_pattern && r.merchant_pattern === merchant) ||
        (desc && r.description_pattern && r.description_pattern === desc)
      );
    }

    async function loadCategories() {
      _categories = await fetchJson('/api/categories');
      _rules = await fetchJson('/api/rules');
      _subcategories = await fetchJson('/api/subcategories');
      renderCategories(_categories, _rules, _subcategories);
    }

    function rulesForCategory(catId) {
      return _rules.filter(r => r.category_id === catId);
    }

    function subsForCategory(catId) {
      return _subcategories.filter(s => s.category_id === catId);
    }

    function renderCategories(cats, rules, subs) {
      const container = document.getElementById('categories-list');
      container.innerHTML = '';
      if (!cats.length) {
        container.innerHTML = '<div style="color:rgb(148,163,184);">No categories yet.</div>';
        return;
      }
      cats.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'cat-row';
        div.innerHTML = `
          <div>
            <span class="pill" style="background:${cat.color || 'rgb(31,41,55)'}; font-weight:600;">${cat.name}</span>
            <div style="font-size:12px; color:rgb(148,163,184); margin-top:4px;">Budget: ${cat.budget || 0}</div>
          </div>
          <div style="display:flex; gap:6px;">
            <button data-id="${cat.id}" class="open-rules">Rules</button>
            <button data-id="${cat.id}" class="open-subs">Subcategories</button>
            <button data-id="${cat.id}" class="edit-cat">Edit</button>
            <button data-id="${cat.id}" class="delete-cat">Delete</button>
          </div>
        `;
        div.querySelector('.delete-cat').addEventListener('click', () => deleteCategory(cat.id));
        div.querySelector('.edit-cat').addEventListener('click', () => fillCatForm(cat));
        div.querySelector('.open-rules').addEventListener('click', () => openRulesModal(cat));
        div.querySelector('.open-subs').addEventListener('click', () => openSubsModal(cat));
        container.appendChild(div);
      });
    }

    function subName(subId) {
      const sub = _subcategories.find(s => s.id === subId);
      return sub ? sub.name : null;
    }

    function renderRulesSection(categoryId) {
      const rules = rulesForCategory(categoryId);
      const subs = subsForCategory(categoryId);
      const subOptions = [`<option value="">Base category</option>`, ...subs.map(s => `<option value="${s.id}">${s.name}</option>`)].join('');
      const list = rules.length
        ? rules.map(r => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid rgb(31,41,55);">
              <div>
                <div style="font-weight:600;">${r.name || '(no name)'}</div>
                <div style="font-size:12px; color:rgb(148,163,184);">
                  Merchant: ${r.merchant_pattern || '-'} | Desc: ${r.description_pattern || '-'}
                </div>
                <div style="margin-top:2px;">
                  <span class="pill" style="background:${r.subcategory_id ? 'rgb(59,130,246)' : 'rgb(31,41,55)'}; color: white; font-size:11px;">
                    ${r.subcategory_id ? `Subcategory: ${subName(r.subcategory_id) || r.subcategory_id}` : 'Base category'}
                  </span>
                </div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="edit-rule" data-id="${r.id}" data-cat="${categoryId}">Edit</button>
                <button class="delete-rule" data-id="${r.id}" data-cat="${categoryId}">Delete</button>
              </div>
            </div>
          `).join('')
        : '<div style="color:rgb(148,163,184);">No rules for this category.</div>';

      return `
        <div style="margin-top:4px; padding:8px; border:1px solid rgb(31,41,55); border-radius:8px; background:rgb(11,18,32);">
          <div style="margin-bottom:10px;">
            <div style="font-size:12px; color:rgb(148,163,184); margin-bottom:4px;">Add a rule (matches if merchant or description contains/fuzzy-matches)</div>
            <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
              <input data-cat-merchant="${categoryId}" placeholder="Merchant pattern" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);" />
              <input data-cat-desc="${categoryId}" placeholder="Description pattern" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);" />
              <select data-cat-sub="${categoryId}" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);">
                ${subOptions}
              </select>
              <button class="add-rule" data-cat="${categoryId}">Save rule</button>
            </div>
          </div>
          ${list}
        </div>
      `;
    }

    function renderSubsSection(categoryId) {
      const subs = subsForCategory(categoryId);
      const list = subs.length
        ? subs.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px solid rgb(31,41,55);">
              <div>
                <div style="font-weight:600;">${s.name}</div>
                <div style="font-size:12px; color:rgb(148,163,184);">Budget: ${s.budget || 0}</div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="edit-sub" data-id="${s.id}" data-cat="${categoryId}">Edit</button>
                <button class="delete-sub" data-id="${s.id}" data-cat="${categoryId}">Delete</button>
              </div>
            </div>
          `).join('')
        : '<div style="color:rgb(148,163,184);">No subcategories for this category.</div>';

      return `
        <div style="margin-top:4px; padding:8px; border:1px solid rgb(31,41,55); border-radius:8px; background:rgb(11,18,32);">
          <div style="margin-bottom:10px;">
            <div style="font-size:12px; color:rgb(148,163,184); margin-bottom:4px;">Add / Edit subcategory</div>
            <div style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;">
              <input data-sub-name="${categoryId}" placeholder="Subcategory name" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);" />
              <input data-sub-budget="${categoryId}" placeholder="Budget" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240); width:100px;" />
              <select data-sub-color="${categoryId}" style="padding:6px; border-radius:6px; border:1px solid rgb(31,41,55); background:rgb(15,23,42); color:rgb(226,232,240);">
                <option value="">Color</option>
                <option value="rgb(239,68,68)">Red</option>
                <option value="rgb(249,115,22)">Orange</option>
                <option value="rgb(245,158,11)">Amber</option>
                <option value="rgb(234,179,8)">Yellow</option>
                <option value="rgb(34,197,94)">Green</option>
                <option value="rgb(20,184,166)">Teal</option>
                <option value="rgb(6,182,212)">Cyan</option>
                <option value="rgb(59,130,246)">Blue</option>
                <option value="rgb(99,102,241)">Indigo</option>
                <option value="rgb(139,92,246)">Violet</option>
                <option value="rgb(236,72,153)">Pink</option>
                <option value="rgb(249,115,171)">Fuchsia</option>
              </select>
              <button class="add-sub" data-cat="${categoryId}">Save subcategory</button>
            </div>
          </div>
          ${list}
        </div>
      `;
    }

    function fillCatForm(cat) {
      document.getElementById('cat-name').value = cat.name || '';
      document.getElementById('cat-color').value = cat.color || '';
      document.getElementById('save-cat-btn').dataset.editing = cat.id;
      document.getElementById('cat-budget').value = cat.budget || 0;
    }

    async function saveCategory() {
      const payload = {
        name: document.getElementById('cat-name').value,
        color: document.getElementById('cat-color').value || null,
        budget: parseFloat(document.getElementById('cat-budget').value || '0'),
      };
      if (!payload.name) {
        alert('Name required');
        return;
      }
      const editingId = document.getElementById('save-cat-btn').dataset.editing;
      if (editingId) {
        await fetchJson(`/api/categories/${editingId}`, {method: 'PUT', body: JSON.stringify(payload)});
      } else {
        await fetchJson('/api/categories', {method: 'POST', body: JSON.stringify(payload)});
      }
      document.getElementById('save-cat-btn').dataset.editing = '';
      await loadCategories();
      refreshModalIfOpen();
    }

    async function deleteCategory(id) {
      await fetchJson(`/api/categories/${id}`, {method: 'DELETE'});
      await loadCategories();
      refreshModalIfOpen();
    }

    async function addSubcategory(catId) {
      const name = document.querySelector(`input[data-sub-name="${catId}"]`).value;
      const budget = parseFloat(document.querySelector(`input[data-sub-budget="${catId}"]`).value || '0');
      const color = document.querySelector(`select[data-sub-color="${catId}"]`).value || null;
      const editing = document.querySelector(`button.add-sub[data-cat="${catId}"]`).dataset.editing;
      if (!name) {
        alert('Subcategory name required');
        return;
      }
      if (editing) {
        await fetchJson(`/api/subcategories/${editing}`, {method: 'PUT', body: JSON.stringify({name, budget, color})});
      } else {
        await fetchJson('/api/subcategories', {method: 'POST', body: JSON.stringify({category_id: catId, name, budget, color})});
      }
      document.querySelector(`button.add-sub[data-cat="${catId}"]`).dataset.editing = '';
      await loadCategories();
      refreshModalIfOpen();
    }

    async function deleteSubcategory(id) {
      await fetchJson(`/api/subcategories/${id}`, {method: 'DELETE'});
      await loadCategories();
      refreshModalIfOpen();
    }

    async function editSubcategory(id) {
      const sub = _subcategories.find(s => s.id === id);
      if (!sub) return;
      const catId = sub.category_id;
      document.querySelector(`input[data-sub-name="${catId}"]`).value = sub.name;
      document.querySelector(`input[data-sub-budget="${catId}"]`).value = sub.budget || 0;
      const colorSelect = document.querySelector(`select[data-sub-color="${catId}"]`);
      if (colorSelect) colorSelect.value = sub.color || '';
      const saveBtn = document.querySelector(`button.add-sub[data-cat="${catId}"]`);
      if (saveBtn) saveBtn.dataset.editing = sub.id;
    }

    async function addRuleForCategory(catId) {
      const merchant = document.querySelector(`input[data-cat-merchant="${catId}"]`).value;
      const desc = document.querySelector(`input[data-cat-desc="${catId}"]`).value;
      const addBtn = document.querySelector(`button.add-rule[data-cat="${catId}"]`);
      const subSelect = document.querySelector(`select[data-cat-sub="${catId}"]`);
      const editingId = addBtn ? addBtn.dataset.editing : '';
      const subcategory_id = subSelect && subSelect.value !== '' ? parseInt(subSelect.value, 10) : null;
      if (!merchant && !desc) {
        alert('Add a merchant or description pattern');
        return;
      }
      const payload = {
        name: merchant || desc || 'rule',
        merchant_pattern: merchant,
        description_pattern: desc,
        category_id: catId,
        subcategory_id,
        fuzzy_threshold: 0.75,
        priority: 100
      };
      try {
        const statusEl = document.getElementById('modal-status');
        if (editingId) {
          await fetchJson(`/api/rules/${editingId}`, {method: 'PUT', body: JSON.stringify(payload)});
        } else {
          const conflict = findExistingRule(merchant, desc);
          let finalPayload = {...payload};
          if (conflict) {
            if (!addBtn.dataset.confirmConflict || addBtn.dataset.confirmConflict !== 'true') {
              if (statusEl) statusEl.textContent = `A rule already exists in category "${conflict.category_name || conflict.category_id}". Click Save again to replace it.`;
              addBtn.dataset.confirmConflict = 'true';
              addBtn.dataset.conflictPayload = JSON.stringify(payload);
              return;
            }
            finalPayload = {...payload, replace_existing: true};
          }
          addBtn.dataset.confirmConflict = 'false';
          addBtn.dataset.conflictPayload = '';
          if (statusEl) statusEl.textContent = '';
          await fetchJson('/api/rules', {method: 'POST', body: JSON.stringify(finalPayload)});
        }
      } catch (err) {
        const statusEl = document.getElementById('modal-status');
        if (statusEl) statusEl.textContent = `Failed to save rule: ${err.message}`;
        else alert(`Failed to save rule: ${err.message}`);
        return;
      }
      if (addBtn) addBtn.dataset.editing = '';
      if (subSelect) subSelect.value = '';
      await loadCategories();
      refreshModalIfOpen();
    }

    async function deleteRule(id) {
      await fetchJson(`/api/rules/${id}`, {method: 'DELETE'});
      await loadCategories();
      refreshModalIfOpen();
    }

    document.getElementById('save-cat-btn').addEventListener('click', saveCategory);
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('add-rule')) {
        const catId = parseInt(e.target.dataset.cat, 10);
        addRuleForCategory(catId);
      }
      if (e.target.classList.contains('delete-rule')) {
        const rid = parseInt(e.target.dataset.id, 10);
        deleteRule(rid);
      }
      if (e.target.classList.contains('add-sub')) {
        const catId = parseInt(e.target.dataset.cat, 10);
        addSubcategory(catId);
      }
      if (e.target.classList.contains('delete-sub')) {
        const sid = parseInt(e.target.dataset.id, 10);
        deleteSubcategory(sid);
      }
      if (e.target.classList.contains('edit-sub')) {
        const sid = parseInt(e.target.dataset.id, 10);
        editSubcategory(sid);
      }
      if (e.target.classList.contains('edit-rule')) {
        const rid = parseInt(e.target.dataset.id, 10);
        const rule = _rules.find(r => r.id === rid);
        if (!rule) return;
        const catId = rule.category_id;
        document.querySelector(`input[data-cat-merchant="${catId}"]`).value = rule.merchant_pattern || '';
        document.querySelector(`input[data-cat-desc="${catId}"]`).value = rule.description_pattern || '';
        const btn = document.querySelector(`button.add-rule[data-cat="${catId}"]`);
        if (btn) btn.dataset.editing = rid;
        const subSelect = document.querySelector(`select[data-cat-sub="${catId}"]`);
        if (subSelect) subSelect.value = rule.subcategory_id || '';
      }
    });

    loadCategories();

    // Modal helpers
    function openRulesModal(cat) {
      _modalCatId = cat.id;
      _modalMode = 'rules';
      document.getElementById('modal-title').textContent = `Rules for ${cat.name}`;
      document.getElementById('modal-body').innerHTML = renderRulesSection(cat.id);
      document.getElementById('modal-status').textContent = '';
      showModal();
    }

    function openSubsModal(cat) {
      _modalCatId = cat.id;
      _modalMode = 'subs';
      document.getElementById('modal-title').textContent = `Subcategories for ${cat.name}`;
      document.getElementById('modal-body').innerHTML = renderSubsSection(cat.id);
      document.getElementById('modal-status').textContent = '';
      showModal();
    }

    function showModal() {
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      _modalCatId = null;
      _modalMode = null;
    }

    function refreshModalIfOpen() {
      if (!_modalCatId) return;
      const cat = _categories.find(c => c.id === _modalCatId);
      if (!cat) return;
      if (_modalMode === 'rules') {
        openRulesModal(cat);
      } else if (_modalMode === 'subs') {
        openSubsModal(cat);
      }
    }

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
  </script>
</body>
</html>
